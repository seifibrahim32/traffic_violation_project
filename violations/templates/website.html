<!DOCTYPE html>
<html>
<head>
    <title>Traffic Violations</title>
</head>
<body>
<h1>Traffic Light Violations</h1>

<table border="1">
<tr>
    <th>Time</th>
    <th>Image</th>
    <th>Light</th>
    <th>Camera</th>
</tr>

{% for v in violations %}
<tr>
    <td>{{ v.timestamp }}</td>
    <td><img src="{{ v.image.url }}" width="200"></td>
    <td>{{ v.light_state }}</td>
    <td>{{ v.camera_id }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
